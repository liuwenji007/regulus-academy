# Railway 读取仓库根目录此文件（非 deploy/railway/）
# Volume：在 Dashboard「+ Add → Volume」挂 /app/data

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# 避免 Railway 因根 package.json 误用 pnpm 启动
startCommand = "/app/server"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
