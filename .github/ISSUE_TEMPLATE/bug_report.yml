name: Bug 报告
description: 功能异常或崩溃
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        请尽量提供复现步骤。安全漏洞请走 [SECURITY.md](../SECURITY.md)，不要公开细节。

  - type: textarea
    id: description
    attributes:
      label: 现象描述
      description: 发生了什么？期望是什么？
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 启动 `go run ./cmd/server` 与 `pnpm dev`
        2. 打开 #/graph
        3. …
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 版本 / 提交
      placeholder: main @ abc1234 或 v0.1.0

  - type: dropdown
    id: deploy
    attributes:
      label: 部署方式
      options:
        - 源码开发（go run + pnpm dev）
        - Docker Compose
        - 仅后端二进制
        - 其他

  - type: textarea
    id: logs
    attributes:
      label: 日志或截图
      description: 浏览器控制台、终端输出等
