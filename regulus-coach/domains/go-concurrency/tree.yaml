domain: Go 并发
slug: go-concurrency
version: 1
description: 用 goroutine 和 channel 写出并发安全的 Go 程序

layers:
  entry:
    label: 入门
    time: "约 2.5～3 小时"
    goal: 理解 goroutine 与 channel 基本概念，能看懂常见并发代码并建立知识框架
    nodes:
      - key: goroutine_basics
        title: goroutine 是什么
      - key: first_goroutine
        title: 启动第一个 goroutine
      - key: waitgroup
        title: sync.WaitGroup 等待完成

  intermediate:
    label: 熟悉
    time: "约 10～14 小时"
    goal: 能在项目中独立编写并发代码，处理 channel、锁、超时等大多数日常场景
    nodes:
      - key: channel
        title: channel 通信
      - key: select
        title: select 多路复用
      - key: context
        title: context 超时控制
      - key: mutex
        title: sync.Mutex 互斥锁

  advanced:
    label: 精通
    time: "约 18～25 小时"
    goal: 理解调度与底层机制，能排查死锁、泄漏等疑难问题，应对绝大多数复杂并发场景
    nodes:
      - key: gmp
        title: GMP 调度模型
      - key: channel_internals
        title: channel 底层数据结构
      - key: sync_pool
        title: sync.Pool 对象复用
