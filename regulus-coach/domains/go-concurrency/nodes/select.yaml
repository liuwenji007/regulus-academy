node: select 多路复用
key: select
layer: 熟悉
requires:
  - channel

core_concepts:
  - select 在多个 channel 操作上等待，类似 switch
  - 配合 default 实现非阻塞
  - 空 select 会永久阻塞

common_mistakes:
  - 把 select 当成 switch 做值分支
  - 在循环里 select 未配合超时导致泄漏

boundaries:
  - 不讲 context 超时（另一节点）
  - 不讲 epoll 等底层

exercise_ideas:
  - "用 select 从两个 channel 谁先就绪读谁"
  - "用 select + default 实现非阻塞发送"
