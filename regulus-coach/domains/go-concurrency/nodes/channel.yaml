node: channel 通信
key: channel
layer: 熟悉
requires:
  - waitgroup

core_concepts:
  - 无缓冲 channel 的同步特性
  - 带缓冲 channel 的容量与阻塞条件
  - 方向 channel（只读/只写）
  - for range 遍历 channel

common_mistakes:
  - 往已关闭的 channel 发送导致 panic
  - 忘记 close 导致接收方永久阻塞
  - 无缓冲 channel 双向阻塞导致死锁

boundaries:
  - 不讲 select（下一节点）
  - 不讲 channel 底层实现（精通层）

exercise_ideas:
  - "用 channel 实现两个 goroutine 轮流打印 1-5"
  - "以下代码为什么会 deadlock？"

grading_hints:
  - 无缓冲 channel 发送会阻塞直到有人接收
  - 带缓冲 channel 仅在 buffer 满/空时阻塞
  - 关闭 channel 后不能再发送
  - for range 会在 channel 关闭且 drained 后退出

first_exercise_level: recognition
domain_kind: applied
teaching_beats:
  - concept: 无缓冲 channel 的同步特性
    must_teach:
      - 发送与接收同步握手
      - 常用于 goroutine 间同步
    context_type: workplace
  - concept: 带缓冲 channel 的容量与阻塞条件
    must_teach:
      - 缓冲区满时发送阻塞、空时接收阻塞
      - 适合削峰或解耦生产消费
    context_type: workplace
  - concept: 方向 channel（只读/只写）
    must_teach:
      - chan<- 只写、<-chan 只读
      - 用于限制 API 只能发送或接收
    context_type: workplace
  - concept: for range 遍历 channel
    must_teach:
      - 关闭且 drain 后 range 退出
      - 常见误区：往已关闭 channel 发送会 panic
    context_type: workplace
