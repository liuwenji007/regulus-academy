node: channel 通信
key: channel
layer: 熟悉
requires:
  - waitgroup

core_concepts:
  - 无缓冲 channel 的同步特性
  - 带缓冲 channel 的容量与阻塞条件
  - 方向 channel（只读/只写）
  - for range 遍历 channel

common_mistakes:
  - 往已关闭的 channel 发送导致 panic
  - 忘记 close 导致接收方永久阻塞
  - 无缓冲 channel 双向阻塞导致死锁

boundaries:
  - 不讲 select（下一节点）
  - 不讲 channel 底层实现（精通层）

exercise_ideas:
  - "用 channel 实现两个 goroutine 轮流打印 1-5"
  - "以下代码为什么会 deadlock？"
