node: 复杂业务场景提示词设计
key: complex_scenario_design
layer: 精通
core_concepts:
    - 业务场景的需求拆解
    - 多技巧融合设计方法
    - 边界场景的容错处理
common_mistakes:
    - 忽略业务场景的特殊约束
    - 技巧堆砌无明确设计逻辑
    - 未考虑异常输入的处理
boundaries:
    - 不讲具体行业的业务知识
    - 不讲提示词工程的企业级落地流程
exercise_ideas:
    - 为指定复杂业务场景设计完整提示词方案
    - 分析现有业务提示词的潜在风险并优化
grading_hints:
    - 提示词符合业务场景的核心约束
    - 合理融合多种设计技巧
    - 包含边界场景的容错处理规则
