node: 多模态提示词设计
key: multimodal_prompt
layer: 精通
core_concepts:
    - 多模态提示的构成
    - 文本与图像/音频的协同设计
    - 多模态提示的注意事项
common_mistakes:
    - 文本描述与多模态内容矛盾
    - 忽略多模态信息的优先级
    - 提示词未明确多模态信息的处理要求
boundaries:
    - 不讲多模态模型的原理
    - 不讲纯文本外的其他单模态提示设计
exercise_ideas:
    - 设计图文结合的分类任务提示词
    - 优化多模态提示词中文本与图像的协同逻辑
grading_hints:
    - 文本与多模态内容协同无矛盾
    - 明确多模态信息的处理规则
    - 提示词可引导模型正确融合多模态信息
