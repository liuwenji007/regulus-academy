node: 提示词调试与优化
key: prompt_debugging
layer: 精通
core_concepts:
    - 提示词问题的定位方法
    - 常见输出问题的优化策略
    - 提示词的迭代流程
common_mistakes:
    - 盲目修改提示词无明确方向
    - 优化后忽略其他场景的兼容性
    - 过度优化导致提示词过于复杂
boundaries:
    - 不讲模型层面的bug排查
    - 不讲提示词自动生成工具的使用
exercise_ideas:
    - 针对给定低质量提示词定位问题并优化
    - 设计提示词迭代优化的验证方案
grading_hints:
    - 能准确定位提示词的核心问题
    - 优化方案针对性强可提升输出质量
    - 优化后提示词简洁可用
