node: 思维链提示设计
key: chain_of_thought
layer: 熟悉
core_concepts:
    - 思维链提示的作用
    - 显式思维链的编写方法
    - 隐式思维链的触发方式
common_mistakes:
    - 思维链步骤跳跃逻辑不连贯
    - 思维链与任务无关冗余
    - 过度要求思维链导致输出冗长
boundaries:
    - 不讲思维树、思维图等其他推理范式
    - 不讲思维链的量化效果评估
exercise_ideas:
    - 为推理类任务设计显式思维链提示词
    - 对比有无思维链时模型推理的准确性
grading_hints:
    - 思维链步骤逻辑连贯
    - 每个步骤服务于最终推理目标
    - 提示词引导模型自然输出思维过程
