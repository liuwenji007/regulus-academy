node: 提示词的定义与核心作用
key: prompt_definition
layer: 入门
core_concepts:
    - 提示词的定义
    - 提示词与大语言模型的交互逻辑
    - 提示词对输出质量的影响
common_mistakes:
    - 认为提示词只是简单提问，忽略结构化设计
    - 混淆提示词和模型参数配置的作用
boundaries:
    - 不讲具体提示词编写技巧
    - 不讲模型底层原理
exercise_ideas:
    - 判断给定文本是否属于有效提示词
    - 分析不同提示词对模型输出的影响差异
grading_hints:
    - 能准确说出提示词的核心作用
    - 能区分提示词和模型其他配置的差异
