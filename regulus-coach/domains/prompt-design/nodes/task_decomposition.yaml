node: 复杂任务拆解方法
key: task_decomposition
layer: 熟悉
core_concepts:
    - 任务拆解的原则
    - 子任务的顺序编排
    - 子任务与最终目标的关联
common_mistakes:
    - 子任务拆分过细或过粗
    - 子任务之间逻辑断裂
    - 忽略子任务的输出要求
boundaries:
    - 不讲自动化任务拆解工具
    - 不讲多轮对话的任务拆解
exercise_ideas:
    - 将复杂需求拆解为可执行的提示词子任务
    - 优化现有拆分不合理的任务提示词
grading_hints:
    - 子任务拆分符合逻辑顺序
    - 每个子任务有明确输出要求
    - 子任务可支撑最终目标实现
