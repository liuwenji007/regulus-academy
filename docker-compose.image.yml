# 使用预构建镜像（无需本地 build）。需先在 GitHub Actions 发布镜像。
# 用法：docker compose -f docker-compose.image.yml up -d

services:
  api:
    image: ${REGULUS_IMAGE:-ghcr.io/liuwenji007/regulus-academy:latest}
    ports:
      - "${HOST_PORT:-8080}:8080"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      # 预构建镜像可能未内置 regulus-coach；安装目录挂载保证 Coach 可读
      - ./regulus-coach:/app/regulus-coach:ro
    environment:
      - DATABASE_PATH=/app/data/regulus.db
      - REGULUS_COACH_ROOT=/app/regulus-coach
    pull_policy: always
