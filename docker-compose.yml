services:
  api:
    image: ${REGULUS_IMAGE:-ghcr.io/liuwenji007/regulus-academy:latest}
    build: .
    ports:
      - "${HOST_PORT:-8080}:8080"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_PATH=/app/data/regulus.db
      - REGULUS_COACH_ROOT=/app/regulus-coach
